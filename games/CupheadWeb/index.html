<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>Unity WebGL Player | Cuphead</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box
      }

      body {
        background: #000;
        overflow: hidden
      }

      #loading-text {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font: 24px Arial
      }

      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block
      }

      #unity-mobile-warning {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        background: rgba(0, 0, 0, .9);
        padding: 20px;
        border-radius: 8px;
        font: 14px Arial
      }

      #fps-graph {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 200px;
        height: 70px;
        background: rgba(0, 0, 0, .8);
        border-radius: 6px;
        padding: 10px;
        z-index: 9999;
        transition: .3s
      }

      #fps-canvas {
        width: 100%;
        height: 100%;
        display: block
      }

      .savebtn {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 10px 18px;
        cursor: pointer;
        background: rgba(50, 50, 50, .85);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, .2);
        border-radius: 6px;
        font: 14px Arial;
        z-index: 9999;
        transition: .3s
      }

      .savebtn:hover {
        background: rgba(70, 70, 70, .95)
      }

      .hidden {
        opacity: 0;
        pointer-events: none
      }
    </style>
  </head>
  <body>
    <div id="unity-mobile-warning">WebGL not supported on mobile</div>
	<div id="loading-text">Loading...</div>
    <canvas id="unity-canvas"></canvas>
    <div id="fps-graph" style="display:none">
      <canvas id="fps-canvas"></canvas>
    </div>
    <script>
      alert("this web port was made by crackers (woahhcrackers) dont take credit for it")
      const lt = document.getElementById("loading-text"),
        cv = document.getElementById("unity-canvas"),
        mw = document.getElementById("unity-mobile-warning"),
        fg = document.getElementById("fps-graph"),
        fc = document.getElementById("fps-canvas");
      let lb = 0,
        hd = false,
        tm_id;
      const tm = '1276.05',
        fh = [],
        ml = 90;
      fc.width = 180;
      fc.height = 50;
      const ctx = fc.getContext('2d');
      let lft = performance.now(),
        fr = 0,
        fps = 60,
        sb;

      function uf() {
        const nt = performance.now(),
          dt = (nt - lft) / 1000;
        lft = nt;
        fps = dt > 0 ? 1 / dt : 60;
        fr++;
        if (fr % 3 === 0) {
          fh.push(fps);
          if (fh.length > ml) fh.shift();
          ctx.clearRect(0, 0, 180, 50);
          for (let i = 0; i < fh.length; i++) {
            const f = fh[i],
              h = Math.min(f / 60, 1) * 35,
              c = f > 50 ? '#0f0' : f > 30 ? '#fa0' : '#f33';
            ctx.fillStyle = c;
            ctx.fillRect(i * 2, 50 - h, 1.8, h);
          }
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 13px monospace';
          ctx.shadowColor = '#000';
          ctx.shadowBlur = 4;
          ctx.fillText(Math.round(fps) + ' FPS', 6, 16);
          ctx.shadowBlur = 0;
        }
        requestAnimationFrame(uf);
      }

      function shw() {
        hd = false;
        fg.classList.remove('hidden');
        if (sb) sb.classList.remove('hidden');
      }

      function rst() {
        clearTimeout(tm_id);
        if (!hd) {
          hd = true;
          fg.classList.add('hidden');
          if (sb) sb.classList.add('hidden');
        }
        tm_id = setTimeout(shw, 5000);
      }
      document.addEventListener('keydown', rst);
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const m = document.createElement('meta');
        m.name = 'viewport';
        m.content = 'width=device-width,height=device-height,initial-scale=1,user-scalable=no,shrink-to-fit=yes';
        document.head.appendChild(m);
        mw.style.display = "block";
        setTimeout(() => mw.style.display = "none", 5000);
      }
      async function fwp(u) {
        const r = await fetch(u),
          rd = r.body.getReader(),
          ch = [];
        while (true) {
          const {
            done,
            value
          } = await rd.read();
          if (done) break;
          lb += value.length;
          ch.push(value);
          lt.textContent = `${(lb/1048576).toFixed(2)} MB / ${tm} MB`;
        }
        return URL.createObjectURL(new Blob(ch));
      }
      async function mf(p) {
        const b = await Promise.all(p.map(fwp)),
          bl = await Promise.all(b.map(u => fetch(u).then(r => r.blob())));
        return URL.createObjectURL(new Blob(bl));
      }

      function gp(base, start, end) {
  return Array.from({ length: end - start + 1 }, (_, i) => {
    const n = String(start + i).padStart(3, '0');
    return `${base}.${n}`;
  });
}
(async () => {
        async function autoChunks(base, max = 200) {
  const urls = [];
  for (let i = 1; i <= max; i++) {
    const n = String(i).padStart(3, '0');
    const url = `${base}.${n}`;
    const r = await fetch(url, { method: 'HEAD' });
    if (!r.ok) break;
    urls.push(url);
  }
  return urls;
}

const dc = await autoChunks("Build/Cuphead.data");
const du = await mf(dc);
const wu = "Build/Cuphead.wasm";
 sc = document.createElement("script");
        sc.src = "Build/Cuphead.loader.js";
        sc.onload = () => {
          createUnityInstance(cv, {
            dataUrl: du,
            frameworkUrl: "Build/Cuphead.framework.js",
            codeUrl: wu,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "crackers",
            productName: "Cuphead",
            productVersion: "1.0"
          }).then(() => {
            lt.remove();
            asb();
            fg.style.display = 'block';
            uf();
          }).catch(alert);
        };
        document.body.appendChild(sc);
      })();

      function asb() {
        sb = document.createElement('button');
        sb.className = 'savebtn';
        sb.textContent = 'download';
        document.body.appendChild(sb);
      }

      function odb(n) {
        return new Promise((ok, bd) => {
          const r = indexedDB.open(n);
          r.onsuccess = () => ok(r.result);
          r.onerror = () => bd(r.error);
        });
      }

      function ga(d, s) {
        return new Promise((ok, bd) => {
          const t = d.transaction([s], 'readonly'),
            st = t.objectStore(s),
            r = st.getAll();
          r.onsuccess = () => ok(r.result);
          r.onerror = () => bd(r.error);
        });
      }
    </script>
  </body>
</html
